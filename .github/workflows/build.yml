name: Build Podcast Site

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Ensure script is executable
        run: chmod +x build.sh

      - name: Shell syntax check
        run: bash -n build.sh

      - name: Install optional tools
        run: |
          sudo apt-get update
          # xmllint (libxml2-utils) is optional; build.sh will fall back to Python if absent,
          # but installing it keeps output formatting consistent.
          sudo apt-get install -y libxml2-utils

      - name: Run build
        run: ./build.sh

      - name: Commit generated files (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: rebuild site [skip ci]"
          git push
